migration_run_id: "2026-05-25-prod-migration"

source:
  type: mongodb
  # Prefer a MongoDB URI for Atlas/local MongoDB, e.g. mongodb+srv://... or mongodb://...
  connection_string: "${SOURCE_DB_URI}"
  database: "${SOURCE_DB_NAME}"

target:
  # Neon is PostgreSQL-compatible; type "neon" uses the Postgres connector.
  type: neon
  host: "${TARGET_DB_HOST}"
  port: 5432
  user: "${TARGET_DB_USER}"
  password: "${TARGET_DB_PASSWORD}"
  database: "${TARGET_DB_NAME}"
  ssl: true

tables:
  - name: customers
    pk: customer_id
    schema: "${TARGET_DB_SCHEMA}"
    sla_freshness_hours: 2
    business_rules:
      - name: total_customer_count
        expression: "SELECT COUNT(*) AS total FROM customers"
        description: "Total customer count should match"
      - name: active_ratio
        expression: "SELECT ROUND(COUNT(*) FILTER (WHERE status = 'active')::numeric / COUNT(*)::numeric * 100, 2) AS ratio FROM customers"
        description: "Active customer ratio should be preserved"

  - name: orders
    pk: order_id
    schema: "${TARGET_DB_SCHEMA}"
    sla_freshness_hours: 1
    business_rules:
      - name: total_revenue
        expression: "SELECT SUM(total_amount) AS revenue FROM orders"
        description: "Total revenue must match exactly"
      - name: avg_order_value
        expression: "SELECT ROUND(AVG(total_amount)::numeric, 2) AS aov FROM orders"
        description: "Average order value should be preserved"

  - name: order_items
    pk: item_id
    schema: "${TARGET_DB_SCHEMA}"
    sla_freshness_hours: 1

  - name: products
    pk: product_id
    schema: "${TARGET_DB_SCHEMA}"
    sla_freshness_hours: 24

thresholds:
  row_count_tolerance_pct: 0          # Exact row count match
  null_rate_delta_pct: 1              # Allow 1% null rate variance
  distribution_drift_pvalue: 0.05     # KS test significance level
  cardinality_change_pct: 10          # Flag >10% cardinality changes
  chunk_size: 100000                  # Rows per reconciliation chunk
  cdc_lag_max_minutes: 15             # Max CDC pipeline lag
  hash_algorithm: md5                 # md5 for speed, sha256 for compliance
  volume_baseline_pct: 10             # ±10% volume variance allowed
  fuzzy_duplicate_threshold: 0.85     # Levenshtein similarity threshold
  levenshtein_max_distance: 3         # Max edit distance for fuzzy dupes
  parallel_chunk_workers: 4           # Concurrent chunk hash workers

agents:
  table_profiling: true
  column_profiling: true
  pattern_analysis: true
  reconciliation: true
  semantic: true
  freshness: true

llm:
  provider: "${LLM_PROVIDER}"          # openai or openrouter
  model: "${LLM_MODEL}"
  base_url: "${LLM_BASE_URL}"          # OpenAI-compatible endpoint for OpenRouter/Qwen
  max_tokens: 4096
  temperature: 0

notifications:
  # slack_webhook: "${SLACK_WEBHOOK_URL}"
  alert_on:
    - HIGH
    - MEDIUM
